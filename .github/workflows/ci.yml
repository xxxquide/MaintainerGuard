name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m unittest discover -s tests -v
      - run: python3 -m compileall -q maintainerguard
      - run: python3 -m pip wheel . --no-deps
      - run: python3 -m maintainerguard validate-config
      - run: python3 -m maintainerguard demo --scenario high-risk-auth
      - run: python3 -m maintainerguard demo --scenario dependency-advisory
      - run: python3 -m maintainerguard analyze-issue examples/sample-data/issues/bug-missing-reproduction.json
      - run: python3 -m maintainerguard analyze-release examples/sample-data/releases/v0.2.0.json
