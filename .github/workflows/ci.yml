name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python3 -m unittest discover -s tests -v
      - run: python3 -m compileall -q maintainerguard
      - run: python3 -m pip wheel . --no-deps
      - run: ./mg verify
      - run: python3 -m maintainerguard validate-config
      - run: python3 -m maintainerguard demo --scenario high-risk-auth
      - run: python3 -m maintainerguard demo --scenario dependency-advisory
      - run: python3 -m maintainerguard demo --scenario secret-finding
      - run: python3 -m maintainerguard demo --scenario high-risk-auth --format json
      - run: python3 -m maintainerguard analyze-pr examples/sample-data/prs/dependency-update.json --scanner examples/sample-data/scanners/dependency-advisory.json
      - run: python3 -m maintainerguard analyze-issue examples/sample-data/issues/bug-missing-reproduction.json
      - run: python3 -m maintainerguard analyze-release examples/sample-data/releases/v0.3.0.json
