name: MaintainerGuard issue triage dry run

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate dry-run issue report
        uses: ./
        with:
          mode: analyze-issue
          dry-run: "true"
