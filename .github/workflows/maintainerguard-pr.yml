name: MaintainerGuard PR dry run

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate dry-run report
        uses: xxxquide/MaintainerGuard@v0.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          mode: analyze-pr
          dry-run: "true"
          post-comment: "false"
          report-length: concise
