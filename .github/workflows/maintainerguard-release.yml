name: MaintainerGuard scheduled release sample

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate release-readiness report from prepared feed
        uses: xxxquide/MaintainerGuard@v0.1.4
        with:
          mode: analyze-release
          scenario-or-sample-input-path: examples/sample-data/releases/v0.2.0.json
          dry-run: "true"
